name: CI

on: [push, pull_request]

jobs:
  lint:
    name: Check linting, formatting, types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: |
          pnpm install
          pnpm check
          pnpm check:types

  test:
    name: Test rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: |
          pnpm install
          pnpm test
          pnpm test:e2e
